<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexThemes — Themes For Codex</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell" id="app">

  <!-- Left Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="logo.svg" width="34" height="34" alt="DexThemes">
        </div>
        <div class="sidebar-brand-copy">
          <div class="sidebar-brand-name">DexThemes</div>
          <div class="sidebar-brand-sub">Theme gallery for Codex</div>
        </div>
      </div>
      <button class="new-chat-btn" id="submit-btn" onclick="toggleBuilderMode()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="submit-btn-text">Create a theme</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Search + Filter + Sort -->
    <div class="search-bar-wrapper" id="search-bar-wrapper">
      <div class="search-bar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search themes..." id="sidebar-search" oninput="renderSidebar()">
        <div class="search-controls">
          <button class="search-filter-btn" id="filter-btn" onclick="toggleFilterDropdown(event)" title="Filter variants">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </button>
          <button class="search-sort-btn" id="sort-btn" onclick="toggleSortDropdown(event)" title="Sort themes">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="search-dropdown" id="filter-dropdown"></div>
      <div class="search-dropdown" id="sort-dropdown"></div>
    </div>

    <!-- Category / Thread list -->
    <div class="category-list" id="category-list"></div>

    <div class="sidebar-footer">
      <div class="sidebar-auth-row" id="auth-area"></div>
      <div class="sidebar-meta">Made with love by <a href="https://x.com/daeshawn" target="_blank" class="footer-credit-link">@Daeshawn</a></div>
      <div class="sidebar-footer-disclaimer">Community-built. Not affiliated with OpenAI.</div>
    </div>
  </div>

  <!-- Main Preview -->
  <div class="main">
    <div class="main-header">
      <div class="main-title" id="preview-theme-name">Codex</div>
    </div>
    <div class="preview-area">
      <!-- Onboarding overlay (first visit only) -->
      <div class="onboarding-overlay" id="onboarding-overlay" style="display:none;"></div>
      <div class="preview-window" id="preview-window">
        <div class="preview-titlebar" id="preview-titlebar">
          <div class="preview-dots">
            <div class="preview-dot"></div>
            <div class="preview-dot"></div>
            <div class="preview-dot"></div>
          </div>
          <span class="preview-window-title">Codex</span>
        </div>
        <div class="preview-chat" id="preview-chat"></div>
        <div class="preview-input-bar" id="preview-input-bar">
          <div class="preview-input-inner" id="preview-input-inner">
            <input type="text" class="preview-input-text" id="preview-input-text" placeholder="Ask anything..." autocomplete="off" spellcheck="false">
            <div class="preview-send-btn" id="preview-send-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel — Light/Dark Previews + Copy -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Variants</div>
    </div>

    <div class="variant-cards">
      <!-- Dark preview card -->
      <div class="variant-card selected" id="card-dark" onclick="selectVariant('dark')">
        <div class="variant-card-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          Dark
        </div>
        <div class="mini-preview" id="mini-dark"></div>
      </div>

      <!-- Light preview card -->
      <div class="variant-card" id="card-light" onclick="selectVariant('light')">
        <div class="variant-card-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Light
        </div>
        <div class="mini-preview" id="mini-light"></div>
      </div>
    </div>

    <!-- Accent + Copy — pinned to bottom -->
    <div class="panel-actions">
      <div class="detail-row">
        <span class="detail-label">Accent color</span>
      </div>
      <div class="accent-dots" id="accent-dots"></div>
      <div class="detail-row">
        <span class="detail-label">Import string</span>
        <span class="detail-hint" id="variant-hint">dark variant</span>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="copyTheme()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy import string
      </button>
      <div class="import-hint">Copy, then paste in Codex → Settings → Appearance → Import theme</div>
    </div>
  </div>

</div>
<script src="theme-data/dexthemes/helpers.js"></script>
<script src="theme-data/dexthemes/anime.js"></script>
<script src="theme-data/dexthemes/games.js"></script>
<script src="theme-data/dexthemes/movies.js"></script>
<script src="theme-data/dexthemes/comics.js"></script>
<script src="theme-data/dexthemes/zodiacs.js"></script>
<script src="theme-data/dexthemes/lunar.js"></script>
<script src="theme-data/dexthemes/originals.js"></script>
<script src="app.js"></script>
</body>
</html>
